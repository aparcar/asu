name: Upload Python Package and Docker Container
permissions:
  contents: read

on:
  push:
    branches:
      - main
  release:
    types:
      - created

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set __version__ and project version
        run: |
          TAG="$(git describe --tags --always | awk -F"-" '{if (NF>1) {print substr($1, 2)".post"$2} else {print substr($1, 2)}}')"
          echo "__version__ = \"$TAG\"" > asu/__init__.py
          sed -i "s/^version = .*/version = \"$TAG\"/" pyproject.toml

      - name: Build and publish PyPi package
        if: github.event_name == 'release'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv build
          uv publish

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: openwrt/asu
          tags: |
            type=semver,pattern={{version}}
            latest

      - name: Login to DockerHub
        if: github.repository_owner == 'openwrt'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ASU to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: ${{ github.repository_owner == 'openwrt' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
